version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: bos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: business_os
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d business_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bos_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bos_backend
    restart: unless-stopped
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DATABASE_URL=postgresql+asyncpg://app:${DB_PASSWORD:-changeme}@postgres:5432/business_os
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CELERY_URL=redis://redis:6379/1
      - BANK_TOKEN_ENCRYPTION_KEY=${BANK_TOKEN_ENCRYPTION_KEY}
      - TINKOFF_CLIENT_ID=${TINKOFF_CLIENT_ID}
      - TINKOFF_CLIENT_SECRET=${TINKOFF_CLIENT_SECRET}
      - SBER_CLIENT_ID=${SBER_CLIENT_ID}
      - SBER_CLIENT_SECRET=${SBER_CLIENT_SECRET}
      - YANDEXGPT_FOLDER_ID=${YANDEXGPT_FOLDER_ID}
      - YANDEXGPT_IAM_TOKEN=${YANDEXGPT_IAM_TOKEN}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_KEY=${S3_KEY}
      - S3_SECRET=${S3_SECRET}
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: bos_celery
    restart: unless-stopped
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DATABASE_URL=postgresql+asyncpg://app:${DB_PASSWORD:-changeme}@postgres:5432/business_os
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CELERY_URL=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - BANK_TOKEN_ENCRYPTION_KEY=${BANK_TOKEN_ENCRYPTION_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_KEY=${S3_KEY}
      - S3_SECRET=${S3_SECRET}
    depends_on:
      - backend
      - redis
    command: >
      celery -A app.tasks worker -l info
      -Q documents,banks,taxes,notifications,ai
      --concurrency=4

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: bos_bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN:-fake_token_for_dev}
      - API_URL=http://backend:8000
      - REDIS_URL=redis://redis:6379/1
      - MINI_APP_URL=${MINI_APP_URL:-http://localhost:3000}
    depends_on:
      - backend
      - redis
    command: python -m app.main

  document_engine:
    build:
      context: ./document_engine
      dockerfile: Dockerfile
    container_name: bos_document_engine
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/1
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_KEY=${S3_KEY}
      - S3_SECRET=${S3_SECRET}
      - S3_REGION=${S3_REGION:-ru-1}
      - LIBREOFFICE_PATH=/usr/bin/libreoffice
      - BACKEND_API_URL=http://backend:8000
    depends_on:
      - redis
      - backend
    command: >
      celery -A app.main worker -l info -Q documents --concurrency=2

  mini-app:
    build:
      context: ./mini-app
      dockerfile: Dockerfile
    container_name: bos_mini_app
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: bos_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - bot

volumes:
  postgres_data:
  redis_data:
